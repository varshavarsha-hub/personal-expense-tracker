{% extends 'base.html' %}

{% block content %}

<div class="form-container">

    <h1>Add Expense</h1>

    <form method="POST">

        <input
            type="text"
            name="title"
            placeholder="Expense Title"
            required>

        <input
            type="number"
            step="0.01"
            name="amount"
            placeholder="Amount"
            required>

        <input
            type="text"
            name="category"
            placeholder="Category"
            required>

        <input
            type="date"
            name="date"
            required>

        <button type="submit">

            Add Expense

        </button>

    </form>

</div>

{% endblock %}
